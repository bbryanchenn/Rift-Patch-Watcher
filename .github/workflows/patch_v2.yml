name: Rift Patch Watcher v2

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install deps
        run: pip install requests

      - name: run bot
        env:
          PATCH_WEBHOOK: ${{ secrets.PATCH_WEBHOOK }}
          BANNER_WEBHOOK: ${{ secrets.BANNER_WEBHOOK }}
        run: python bot.py

      - name: save state
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "patch-bot"
          git config user.email "bot@github.com"
          git add state.json
          git commit -m "update patch state"
          git push
